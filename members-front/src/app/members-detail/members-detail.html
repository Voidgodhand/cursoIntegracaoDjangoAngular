<h2><span>Você está editando:</span> {{ selected_member.name}} {{ selected_member.surname}}</h2>

<label for ="">Id:</label>
<input type="text" [(ngModel)]="selected_member.id" readonly>
<br>
<label for ="">Nome:</label>
<input type="text" [(ngModel)]="selected_member.name">
<br>
<label for ="">Sobrenome:</label>
<input type="text" [(ngModel)]="selected_member.surname">
<br>
<label for ="">Telefone:</label>
<input type="text" [(ngModel)]="selected_member.phone">
<br>
<label for ="">Email:</label>
<input type="text" [(ngModel)]="selected_member.email">
<br>
<label for ="">Endereço:</label>
<input type="text" [(ngModel)]="selected_member.address">
<br>

<button (click)="update()" class="button primary">Alterar</button>
&nbsp;
<button (click)="delete()" class="button primary">Excluir</button>
